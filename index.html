<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内耗指数测评</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PTC2284JST"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-PTC2284JST');
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px; }
.container { width: 100%; max-width: 420px; }
.card { background: #ffffff; border-radius: 20px; padding: 28px 24px; }

.intro-eyebrow { font-size: 12px; color: #999; letter-spacing: 0.08em; margin-bottom: 14px; }
.intro-title { font-size: 32px; font-weight: 600; color: #111; line-height: 1.25; margin-bottom: 12px; }
.intro-sub { font-size: 15px; color: #888; line-height: 1.7; margin-bottom: 28px; }
.tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
.tag { font-size: 12px; color: #777; border: 1px solid #ddd; border-radius: 99px; padding: 5px 13px; }
.start-btn { width: 100%; padding: 17px; background: #111; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; }
.start-btn:hover { background: #333; }

.progress-bg { height: 3px; background: #eee; border-radius: 2px; margin-bottom: 24px; }
.progress-fill { height: 3px; background: #111; border-radius: 2px; transition: width 0.4s; }
.q-num { font-size: 12px; color: #bbb; letter-spacing: 0.06em; margin-bottom: 10px; }
.q-text { font-size: 18px; font-weight: 500; color: #111; line-height: 1.55; margin-bottom: 24px; }
.options { display: flex; flex-direction: column; gap: 10px; }
.opt { padding: 14px 16px; border: 1.5px solid #e5e5e5; border-radius: 12px; cursor: pointer; font-size: 15px; color: #333; background: #fff; text-align: left; line-height: 1.45; transition: all 0.15s; }
.opt:hover { border-color: #aaa; background: #fafafa; }
.opt.selected { border-color: #111; background: #f5f5f5; color: #111; }
.nav { display: flex; gap: 12px; margin-top: 24px; }
.btn-prev { padding: 13px 20px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; cursor: pointer; background: transparent; color: #999; }
.btn-prev:disabled { opacity: 0.3; cursor: default; }
.btn-next { flex: 1; padding: 14px; background: #111; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; }
.btn-next:disabled { background: #ccc; cursor: default; }
.btn-next:not(:disabled):hover { background: #333; }

.result-eyebrow { font-size: 12px; color: #999; letter-spacing: 0.08em; margin-bottom: 8px; }
.result-score { font-size: 60px; font-weight: 600; color: #111; line-height: 1; }
.result-unit { font-size: 24px; color: #bbb; }
.result-level { font-size: 17px; font-weight: 500; margin: 8px 0 16px; }
.result-desc { font-size: 14px; color: #666; line-height: 1.75; padding-bottom: 24px; border-bottom: 1px solid #f0f0f0; margin-bottom: 24px; }
.section-label { font-size: 11px; color: #bbb; letter-spacing: 0.08em; margin-bottom: 14px; }
.dim-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 24px; }
.dim-card { background: #f7f6f2; border-radius: 12px; padding: 13px 14px; }
.dim-name { font-size: 11px; color: #aaa; margin-bottom: 4px; }
.dim-val { font-size: 22px; font-weight: 600; color: #111; }
.dim-bar-bg { height: 3px; background: #e0e0e0; border-radius: 2px; margin-top: 8px; }
.dim-bar-fill { height: 3px; border-radius: 2px; }
.advice-box { background: #f7f6f2; border-radius: 14px; padding: 16px 18px; margin-bottom: 24px; }
.advice-text { font-size: 14px; color: #555; line-height: 1.8; }
.ai-box { background: #f7f6f2; border-radius: 14px; padding: 16px 18px; font-size: 14px; color: #555; line-height: 1.8; min-height: 80px; margin-bottom: 24px; }
.retry-btn { width: 100%; padding: 14px; border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 15px; cursor: pointer; background: transparent; color: #999; }
.retry-btn:hover { border-color: #bbb; color: #555; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.loading { animation: blink 1.2s infinite; }
</style>
</head>
<body>
<div class="container">
  <div class="card" id="app"></div>
</div>
<script>
const Q = [
  {t:"做完一件事之后，你会反复回想「我是不是做得不够好」？",d:"rumination",o:["几乎不会，做完就放下了","偶尔会想想","经常会纠结一阵子","几乎每次都会反复想"]},
  {t:"别人说了一句无心的话，你会在心里放多久？",d:"sensitivity",o:["当耳边风，转眼就忘","想一下就过去了","会记好几天，偶尔还想起来","可能会记很久，甚至影响我对那人的看法"]},
  {t:"你有多少次因为「怕麻烦别人」而独自扛着？",d:"boundary",o:["我很少这样，需要帮助就开口","偶尔，但多数时候还是会说","经常，不到万不得已不开口","几乎每次，我习惯自己解决"]},
  {t:"当你需要做一个决定，你通常会……",d:"decision",o:["想好大方向就行动","花一些时间分析，然后决定","反复权衡，担心选错","拖很久，甚至让别人帮我决定"]},
  {t:"睡前你的脑子里通常在做什么？",d:"rumination",o:["什么都不想，很快入睡","偶尔回顾一下今天","经常在想今天做得对不对、明天怎么办","脑子停不下来，越想越睡不着"]},
  {t:"别人对你的评价（包括批评）会影响你多久？",d:"sensitivity",o:["听一下，认为有用才参考","会想想，但很快恢复","影响我好几天，会反复想","会持续影响我，让我对自己产生怀疑"]},
  {t:"你有多频繁觉得「我不够好」？",d:"selfworth",o:["很少，我对自己整体满意","偶尔有，但能调整过来","比较频繁，总觉得自己差点什么","几乎是常态，觉得自己哪哪都不够"]},
  {t:"当你在等一个重要结果时（录取、面试、谈判），你通常……",d:"anxiety",o:["该干嘛干嘛，等消息就好","有点在意，但不影响生活","很难专注其他事，脑子里反复模拟结果","非常焦虑，吃不好睡不好"]},
  {t:"和人发生矛盾或摩擦后，你会……",d:"boundary",o:["沟通清楚，或者放下就过了","心里不舒服，但能消化","反复想是不是自己的错，甚至主动道歉","很久都放不下，影响心情甚至回避对方"]},
  {t:"你有多少时间用在「想象最坏的情况」上？",d:"anxiety",o:["几乎没有，我倾向乐观","偶尔担心，但理性能控制","经常这样，总要把坏情况都想一遍","几乎是习惯，什么事都会先往最坏想"]},
  {t:"帮朋友做了一件事，如果对方没有表示感谢，你会……",d:"selfworth",o:["不在意，帮忙是我自己愿意的","有点在意，但不会说出来","心里会有落差，觉得自己付出不被看见","会难受很久，甚至开始怀疑这段关系"]},
  {t:"面对一件很重要但很难开始的事，你通常……",d:"decision",o:["直接拆分步骤开始做","准备一段时间后开始","拖延，不断等一个「更好的状态」","一直拖，焦虑但就是迈不出第一步"]},
  {t:"当你独处的时候，你的状态通常是……",d:"rumination",o:["放松，享受一个人的时间","平静，偶尔会发呆","容易胡思乱想，过去和未来都冒出来","很难真正放松，脑子一直在转"]},
  {t:"你有多经常压抑自己真实的感受或需求？",d:"boundary",o:["很少，我会表达自己","偶尔，顾虑场合","经常，怕引起冲突或让别人失望","几乎习惯了，不知道怎么表达自己"]},
  {t:"看完这15道题，你觉得……",d:"awareness",o:["我其实没什么内耗","有些题说中了我","好多题都在说我","看完有点难过，太准了"]}
];
const DN = {rumination:"反刍思维",sensitivity:"情绪敏感",boundary:"边界感",decision:"决策焦虑",selfworth:"自我价值",anxiety:"预期焦虑"};
let cur=0, ans=[];

function render(html){ document.getElementById('app').innerHTML=html; }

function intro(){
  render(`
    <p class="intro-eyebrow">内耗指数测评</p>
    <h1 class="intro-title">你到底<br>有多内耗？</h1>
    <p class="intro-sub">15道题，3分钟<br>测出你的内耗程度和核心来源</p>
    <div class="tag-row">
      <span class="tag">阿德勒心理学</span>
      <span class="tag">情绪分析</span>
      <span class="tag">AI个性化解读</span>
    </div>
    <button class="start-btn" onclick="start()">开始测试</button>
  `);
}

function start(){ cur=0; ans=[]; question(); }

function question(){
  const q=Q[cur], pct=Math.round(cur/Q.length*100);
  render(`
    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
    <p class="q-num">${cur+1} / ${Q.length}</p>
    <p class="q-text">${q.t}</p>
    <div class="options">
      ${q.o.map((o,i)=>`<button class="opt${ans[cur]===i?' selected':''}" onclick="pick(${i})">${o}</button>`).join('')}
    </div>
    <div class="nav">
      <button class="btn-prev" onclick="prev()" ${cur===0?'disabled':''}>上一题</button>
      <button class="btn-next" id="nx" onclick="next()" ${ans[cur]===undefined?'disabled':''}>${cur===Q.length-1?'查看结果 →':'下一题 →'}</button>
    </div>
  `);
}

function pick(i){
  ans[cur]=i;
  document.querySelectorAll('.opt').forEach((o,idx)=>o.classList.toggle('selected',idx===i));
  document.getElementById('nx').disabled=false;
}
function prev(){ if(cur>0){cur--;question();} }
function next(){ if(ans[cur]===undefined)return; if(cur<Q.length-1){cur++;question();}else result(); }

function result(){
  const ds={};
  Q.forEach((q,i)=>{ if(q.d!=='awareness') ds[q.d]=(ds[q.d]||0)+(ans[i]||0); });
  const total=ans.reduce((a,b)=>a+(b||0),0);
  const pct=Math.round(total/(Q.length*3)*100);
  let lv,lc,desc,adv;
  if(pct<=25){lv="低度内耗 🌿";lc="#4a8c1c";desc="你整体状态不错，能比较好地处理情绪、放下过去、专注当下。偶尔的反思和担忧是正常的，不会困住你太久。";adv="继续保持觉察。留意那些偶尔出现的内耗模式，在它变成习惯之前及时调整。";}
  else if(pct<=50){lv="中度内耗 🌤";lc="#b06e10";desc="你的内耗处于中等水平。有时候能放下，有时候又会陷进去。某些特定场景——比如关系、评价、决策——是你的敏感区。";adv="找到你最容易内耗的1-2个维度，针对性地练习。不是要「不想」，而是学会更快地走出来。";}
  else if(pct<=75){lv="高度内耗 🌧";lc="#c04a1a";desc="你很容易陷入反复思考、担忧和自我怀疑的循环。这消耗了大量的精力，让你很难真正放松或专注。这不是你的错，这是大脑的一种习惯模式。";adv="阿德勒心理学的核心洞察：你的很多内耗，来自承担了不属于你的课题。学会区分「这是我的事」还是「这是别人的事」，是突破的关键。";}
  else{lv="重度内耗 ⛈";lc="#991a1a";desc="你长期处于高度内耗状态，脑子几乎停不下来。情绪敏感、自我批判、无法放松——这已经在影响你的睡眠、决策和关系。";adv="不要用意志力对抗内耗，越对抗越耗。先从小事开始练习「做完就放」。如果条件允许，和专业人士谈谈会有帮助。";}

  const top=Object.entries(ds).sort((a,b)=>b[1]-a[1]).slice(0,4);
  render(`
    <p class="result-eyebrow">内耗指数</p>
    <div class="result-score">${pct}<span class="result-unit">%</span></div>
    <p class="result-level" style="color:${lc}">${lv}</p>
    <p class="result-desc">${desc}</p>
    <p class="section-label">你的内耗来源</p>
    <div class="dim-grid">
      ${top.map(([d,s])=>{const max=Q.filter(q=>q.d===d).length*3||3,p=Math.round(s/max*100);return`<div class="dim-card"><p class="dim-name">${DN[d]||d}</p><p class="dim-val">${p}%</p><div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${p}%;background:${lc}"></div></div></div>`;}).join('')}
    </div>
    <div class="advice-box">
      <p class="section-label" style="margin-bottom:8px">给你的一句话</p>
      <p class="advice-text">${adv}</p>
    </div>
    <p class="section-label">AI 深度解读</p>
    <div class="ai-box loading" id="ai">分析中...</div>
    <button class="retry-btn" onclick="start()">重新测试</button>
  `);
  ai(pct,lv,top);
}

async function ai(pct,lv,top){
  const ts=top.map(([d,s])=>{const max=Q.filter(q=>q.d===d).length*3||3;return DN[d]+':'+Math.round(s/max*100)+'%';}).join('，');
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`用户内耗测试结果：${pct}%，${lv}。主要维度：${ts}。请用200字以内温柔但直接的语气给个性化心理洞察，结合阿德勒课题分离或荣格影子概念自然融入，给一个具体小练习，用「你」称呼，写成自然段落不要列点。`}]})});
    const data=await r.json();
    const box=document.getElementById('ai');
    if(box){box.classList.remove('loading');box.textContent=data.content?.find(b=>b.type==='text')?.text||'暂时无法获取AI解读。';}
  }catch(e){
    const box=document.getElementById('ai');
    if(box){box.classList.remove('loading');box.textContent='AI解读暂时不可用，测试结果仍然有效。';}
  }
}

intro();
</script>
</body>
</html>
